<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Türkiye Deprem Takip</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
  .header { background: linear-gradient(135deg,#1e1b4b,#312e81); padding: 14px 16px 10px; }
  .header-row { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .header-title { font-size: 18px; font-weight: 700; }
  .live-badge { margin-left: auto; display: flex; align-items: center; gap: 5px; font-size: 11px; color: #a5b4fc; background: #1e1b4b; padding: 3px 10px; border-radius: 20px; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .header-sub { font-size: 11px; color: #818cf8; display: flex; align-items: center; gap: 8px; }
  .refresh-btn { margin-left: auto; background: #6366f1; border: none; border-radius: 16px; padding: 3px 12px; color: #fff; font-size: 11px; font-weight: 700; cursor: pointer; }
  .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .tabs { display: flex; background: #1e293b; border-bottom: 1px solid #334155; }
  .tab { flex: 1; padding: 10px 4px; border: none; cursor: pointer; font-size: 11px; font-weight: 700; background: transparent; color: #64748b; border-bottom: 2px solid transparent; }
  .tab.active { background: #312e81; color: #a5b4fc; border-bottom: 2px solid #6366f1; }
  .filter-bar { padding: 8px 14px; background: #1e293b; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; border-bottom: 1px solid #334155; }
  .filter-btn { padding: 4px 11px; border-radius: 20px; border: none; cursor: pointer; font-size: 12px; font-weight: 700; background: #334155; color: #94a3b8; }
  .filter-btn.active { background: #8b5cf6; color: #fff; }
  .count-label { margin-left: auto; font-size: 11px; color: #475569; }
  .list { padding: 10px 14px 24px; display: flex; flex-direction: column; gap: 7px; }
  .card { border-radius: 12px; padding: 11px 13px; border: 1px solid #334155; cursor: pointer; display: flex; align-items: center; gap: 11px; background: #1e293b; position: relative; transition: all .3s; }
  .card.new { background: #0c2233; border-color: #0ea5e9; }
  .card.updated { background: #1a1a00; border-color: #eab308; }
  .card.open { background: #1e1b4b; border-color: #6366f1; }
  .badge-new { position: absolute; top: 0; right: 10px; background: #0ea5e9; border-radius: 0 0 6px 6px; font-size: 9px; font-weight: 700; color: #fff; padding: 1px 7px; }
  .badge-upd { position: absolute; top: 0; right: 10px; background: #ca8a04; border-radius: 0 0 6px 6px; font-size: 9px; font-weight: 700; color: #fff; padding: 1px 7px; }
  .mag-box { min-width: 50px; height: 50px; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
  .mag-val { font-size: 14px; font-weight: 900; }
  .mag-type { font-size: 9px; opacity: .7; }
  .card-info { flex: 1; min-width: 0; }
  .card-place { font-weight: 700; font-size: 13px; color: #f1f5f9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-time { font-size: 11px; color: #64748b; margin-top: 2px; }
  .card-detail { margin-top: 8px; font-size: 12px; color: #94a3b8; border-top: 1px solid #334155; padding-top: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .card-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .error-box { margin: 10px 14px; padding: 12px 14px; background: #450a0a; border-radius: 10px; color: #fca5a5; font-size: 12px; border: 1px solid #7f1d1d; display: flex; justify-content: space-between; align-items: center; }
  .retry-btn { background: #7f1d1d; border: none; border-radius: 6px; color: #fca5a5; padding: 3px 10px; cursor: pointer; font-size: 11px; font-weight: 700; }
  .loading { text-align: center; padding: 50px; color: #475569; }
  .loading-icon { font-size: 32px; margin-bottom: 8px; }
  .stats-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; padding: 14px; }
  .stat-card { background: #1e293b; border-radius: 12px; padding: 13px 10px; text-align: center; border: 1px solid #334155; }
  .stat-icon { font-size: 20px; }
  .stat-val { font-size: 21px; font-weight: 800; color: #f1f5f9; }
  .stat-label { font-size: 11px; color: #64748b; }
  .bar-chart { background: #1e293b; border-radius: 12px; padding: 14px; border: 1px solid #334155; margin: 0 14px 14px; }
  .bar-row { margin-bottom: 9px; }
  .bar-labels { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 3px; }
  .bar-track { background: #334155; border-radius: 4px; height: 7px; }
  .bar-fill { border-radius: 4px; height: 7px; transition: width .5s; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <span style="font-size:22px">🌍</span>
    <span class="header-title">Türkiye Deprem Takip</span>
    <div class="live-badge">
      <span class="live-dot" id="liveDot" style="background:#f97316"></span>
      <span id="liveText">Yükleniyor…</span>
    </div>
  </div>
  <div class="header-sub">
    <span>📡 USGS Canlı</span>
    <span id="lastFetch"></span>
    <span id="countdown" style="color:#475569"></span>
    <button class="refresh-btn" id="refreshBtn" onclick="refresh()">↻ Yenile</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab(0)">🔴 Depremler</button>
  <button class="tab" onclick="switchTab(1)">📊 İstatistik</button>
</div>

<div id="errorBox" class="error-box" style="display:none">
  <span id="errorMsg"></span>
  <button class="retry-btn" onclick="refresh()">Tekrar dene</button>
</div>

<!-- TAB 0 -->
<div id="tab0" class="tab-content active">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setMag(0,this)">Tümü</button>
    <button class="filter-btn" onclick="setMag(1,this)">M≥1</button>
    <button class="filter-btn" onclick="setMag(2,this)">M≥2</button>
    <button class="filter-btn" onclick="setMag(3,this)">M≥3</button>
    <button class="filter-btn" onclick="setMag(4,this)">M≥4</button>
    <span class="count-label" id="countLabel">0 kayıt</span>
  </div>
  <div id="loading" class="loading">
    <div class="loading-icon">📡</div>
    <div>Deprem verileri yükleniyor…</div>
    <div style="font-size:12px;margin-top:6px;color:#334155">ilk açılışta ~30 saniye sürebilir</div>
  </div>
  <div class="list" id="list" style="display:none"></div>
</div>

<!-- TAB 1 -->
<div id="tab1" class="tab-content">
  <div class="stats-grid" id="statsGrid"></div>
  <div class="bar-chart" id="barChart"></div>
</div>

<script>
const BACKEND = "https://deprem-backend-kvmk.onrender.com";
const REFRESH_MS = 60000;

let quakes = [];
let minMag = 0;
let prevState = {};
let newIds = new Set();
let updIds = new Set();
let openId = null;
let countdown = REFRESH_MS / 1000;
let timer, cdTimer;

const MAG_COLOR = m =>
  m>=5 ? {bg:"#7c2d12",tx:"#fdba74",dot:"#f97316"} :
  m>=4 ? {bg:"#713f12",tx:"#fde047",dot:"#eab308"} :
  m>=3 ? {bg:"#1e3a5f",tx:"#93c5fd",dot:"#3b82f6"} :
  m>=2 ? {bg:"#1a2e1a",tx:"#86efac",dot:"#22c55e"} :
         {bg:"#1e1e2e",tx:"#a78bfa",dot:"#7c3aed"};

function fmtDate(t) {
  return new Date(t).toLocaleString("tr-TR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
}
function timeAgo(t) {
  const s = Math.floor((Date.now()-new Date(t))/1000);
  if(s<60) return s+"sn önce";
  if(s<3600) return Math.floor(s/60)+"dk önce";
  if(s<86400) return Math.floor(s/3600)+"sa önce";
  return Math.floor(s/86400)+"g önce";
}

async function fetchData() {
  setLive(false);
  document.getElementById("refreshBtn").disabled = true;
  try {
    const res = await fetch(BACKEND+"/depremler");
    if(!res.ok) throw new Error("Sunucu hatası: "+res.status);
    const json = await res.json();
    if(!json.quakes || json.quakes.length===0) throw new Error("Veri boş geldi.");

    const nextState = {};
    newIds = new Set();
    updIds = new Set();
    for(const q of json.quakes) {
      const fp = q.mag+"|"+q.depth+"|"+q.place;
      nextState[q.id] = fp;
      const prev = prevState[q.id];
      if(prev===undefined) newIds.add(q.id);
      else if(prev!==fp) updIds.add(q.id);
    }
    prevState = nextState;
    quakes = json.quakes;

    document.getElementById("lastFetch").textContent = "· "+fmtDate(new Date());
    countdown = REFRESH_MS/1000;
    hideError();
    renderList();
    renderStats();
    setTimeout(()=>{ newIds=new Set(); updIds=new Set(); renderList(); }, 10000);
    setLive(true);
  } catch(e) {
    showError(e.message);
    setLive(false);
  } finally {
    document.getElementById("refreshBtn").disabled = false;
  }
}

function setLive(on) {
  document.getElementById("liveDot").style.background = on ? "#22c55e" : "#f97316";
  document.getElementById("liveDot").style.boxShadow = on ? "0 0 6px #22c55e" : "0 0 6px #f97316";
  document.getElementById("liveText").textContent = on ? "Canlı" : "Güncelleniyor…";
}

function showError(msg) {
  document.getElementById("errorMsg").textContent = "⚠️ "+msg;
  document.getElementById("errorBox").style.display = "flex";
}
function hideError() {
  document.getElementById("errorBox").style.display = "none";
}

function setMag(v, btn) {
  minMag = v;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderList();
}

function renderList() {
  const filtered = quakes.filter(q=>q.mag>=minMag);
  document.getElementById("countLabel").textContent = filtered.length+" kayıt";
  const loading = document.getElementById("loading");
  const list = document.getElementById("list");
  if(quakes.length===0) { loading.style.display="block"; list.style.display="none"; return; }
  loading.style.display="none"; list.style.display="flex";
  list.innerHTML = filtered.map(q => {
    const c = MAG_COLOR(q.mag);
    const isNew = newIds.has(q.id);
    const isUpd = updIds.has(q.id);
    const isOpen = openId===q.id;
    const cls = isNew?"new":isUpd?"updated":isOpen?"open":"";
    return `<div class="card ${cls}" onclick="toggleCard('${q.id}')">
      ${isNew?'<span class="badge-new">YENİ</span>':""}
      ${isUpd?'<span class="badge-upd">GÜNCELLENDİ</span>':""}
      <div class="mag-box" style="background:${c.bg}">
        <span class="mag-val" style="color:${c.tx}">M${q.mag.toFixed(1)}</span>
        <span class="mag-type" style="color:${c.tx}">${q.magType}</span>
      </div>
      <div class="card-info">
        <div class="card-place">${q.place}</div>
        <div class="card-time">${fmtDate(q.time)} · ${timeAgo(q.time)}</div>
        ${isOpen?`<div class="card-detail">
          <span>🕳️ Derinlik: <b style="color:#e2e8f0">${q.depth} km</b></span>
          <span>📏 Tür: <b style="color:#e2e8f0">${q.magType}</b></span>
          <span>🌐 Enlem: <b style="color:#e2e8f0">${q.lat}</b></span>
          <span>🌐 Boylam: <b style="color:#e2e8f0">${q.lon}</b></span>
        </div>`:""}
      </div>
      <div class="card-dot" style="background:${c.dot}"></div>
    </div>`;
  }).join("");
}

function toggleCard(id) {
  openId = openId===id ? null : id;
  renderList();
}

function renderStats() {
  if(!quakes.length) return;
  const total = quakes.length;
  const today = quakes.filter(q=>q.time.startsWith(new Date().toISOString().slice(0,10))).length;
  const max = Math.max(...quakes.map(q=>q.mag)).toFixed(1);
  const avg = (quakes.reduce((s,q)=>s+q.mag,0)/total).toFixed(1);
  const m3 = quakes.filter(q=>q.mag>=3).length;
  const m4 = quakes.filter(q=>q.mag>=4).length;
  document.getElementById("statsGrid").innerHTML = [
    {icon:"📊",val:total,label:"Toplam (7 gün)"},
    {icon:"📅",val:today,label:"Bugün"},
    {icon:"💥",val:"M"+max,label:"En Büyük"},
    {icon:"📈",val:"M"+avg,label:"Ortalama"},
    {icon:"🔵",val:m3,label:"M≥3"},
    {icon:"⚠️",val:m4,label:"M≥4"},
  ].map(s=>`<div class="stat-card">
    <div class="stat-icon">${s.icon}</div>
    <div class="stat-val">${s.val}</div>
    <div class="stat-label">${s.label}</div>
  </div>`).join("");
  const bars = [
    {label:"M 5+", count:quakes.filter(q=>q.mag>=5).length, color:"#ef4444"},
    {label:"M 4–5",count:quakes.filter(q=>q.mag>=4&&q.mag<5).length,color:"#f97316"},
    {label:"M 3–4",count:quakes.filter(q=>q.mag>=3&&q.mag<4).length,color:"#eab308"},
    {label:"M 2–3",count:quakes.filter(q=>q.mag>=2&&q.mag<3).length,color:"#3b82f6"},
    {label:"M 1–2",count:quakes.filter(q=>q.mag>=1&&q.mag<2).length,color:"#22c55e"},
  ];
  document.getElementById("barChart").innerHTML = `<div style="font-size:13px;font-weight:700;color:#94a3b8;margin-bottom:12px">Büyüklük Dağılımı</div>`+
    bars.map(b=>{
      const pct = Math.round(b.count/total*100);
      return `<div class="bar-row">
        <div class="bar-labels"><span style="color:#94a3b8">${b.label}</span><span style="color:#e2e8f0">${b.count} (%${pct})</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${b.color}"></div></div>
      </div>`;
    }).join("");
}

function switchTab(i) {
  document.querySelectorAll(".tab").forEach((t,j)=>t.classList.toggle("active",i===j));
  document.querySelectorAll(".tab-content").forEach((t,j)=>t.classList.toggle("active",i===j));
}

function refresh() {
  countdown = REFRESH_MS/1000;
  clearInterval(timer);
  timer = setInterval(fetchData, REFRESH_MS);
  fetchData();
}

// Countdown
cdTimer = setInterval(()=>{
  countdown = Math.max(0, countdown-1);
  document.getElementById("countdown").textContent = countdown>0 ? "· "+countdown+"sn" : "";
}, 1000);

// Başlat
fetchData();
timer = setInterval(fetchData, REFRESH_MS);
</script>
</body>
</html>
