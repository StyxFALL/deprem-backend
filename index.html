<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Deprem Takip TR</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#03050f;color:#f1f5f9;min-height:100vh;overflow-x:hidden}

/* ANIMATED BG */
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(99,102,241,.15),transparent),
             radial-gradient(ellipse 60% 40% at 80% 80%,rgba(239,68,68,.08),transparent),
             radial-gradient(ellipse 50% 40% at 20% 60%,rgba(59,130,246,.06),transparent);
  pointer-events:none;z-index:0;
}

/* HEADER */
header{
  position:sticky;top:0;z-index:50;
  background:rgba(3,5,15,.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,.07);
  padding:0 20px;
}
.hdr-top{display:flex;align-items:center;gap:12px;padding:14px 0 6px}
.hdr-logo{
  width:38px;height:38px;border-radius:10px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
  box-shadow:0 0 20px rgba(99,102,241,.4);
}
.hdr-title{font-size:17px;font-weight:800;letter-spacing:-.4px}
.hdr-sub{font-size:11px;color:#64748b;margin-top:1px}
.live-badge{
  margin-left:auto;display:flex;align-items:center;gap:6px;
  background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);
  padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;color:#22c55e;
}
.pulse{width:7px;height:7px;border-radius:50%;background:#22c55e;position:relative}
.pulse::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:2px solid #22c55e;animation:ring 1.5s ease-out infinite;opacity:0}
@keyframes ring{0%{transform:scale(.8);opacity:.8}100%{transform:scale(2);opacity:0}}
.pulse.off{background:#f97316}
.pulse.off::after{border-color:#f97316}
.hdr-meta{display:flex;align-items:center;gap:8px;padding:6px 0 12px;font-size:11px;color:#475569}
.cd-badge{background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.2);color:#818cf8;padding:2px 8px;border-radius:6px;font-size:10px;font-variant-numeric:tabular-nums}
.btn-refresh{
  margin-left:auto;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  border:none;border-radius:8px;padding:6px 16px;
  color:#fff;font-size:11px;font-weight:700;cursor:pointer;
  box-shadow:0 0 16px rgba(99,102,241,.3);transition:all .2s;
}
.btn-refresh:hover{box-shadow:0 0 24px rgba(99,102,241,.5);transform:translateY(-1px)}
.btn-refresh:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}

/* STAT STRIP */
.stat-strip{
  display:grid;grid-template-columns:repeat(4,1fr);
  background:rgba(255,255,255,.02);
  border-bottom:1px solid rgba(255,255,255,.07);
}
.ss-item{padding:12px 8px;text-align:center;border-right:1px solid rgba(255,255,255,.05)}
.ss-item:last-child{border-right:none}
.ss-val{font-size:20px;font-weight:900;background:linear-gradient(135deg,#f1f5f9,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ss-val.red{background:linear-gradient(135deg,#f87171,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ss-val.orange{background:linear-gradient(135deg,#fb923c,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ss-lbl{font-size:10px;color:#475569;margin-top:2px;font-weight:500}

/* TABS */
.tabs{
  display:flex;padding:0 20px;
  background:rgba(255,255,255,.02);
  border-bottom:1px solid rgba(255,255,255,.07);
}
.tab{
  padding:11px 16px;border:none;background:transparent;
  color:#475569;font-size:12px;font-weight:600;cursor:pointer;
  border-bottom:2px solid transparent;transition:all .2s;
}
.tab.on{color:#f1f5f9;border-bottom-color:#6366f1}

/* FILTERS */
.filter-bar{
  display:flex;gap:6px;padding:10px 16px;
  background:rgba(255,255,255,.02);
  border-bottom:1px solid rgba(255,255,255,.06);
  flex-wrap:wrap;align-items:center;
}
.fb{
  padding:5px 14px;border-radius:20px;
  border:1px solid rgba(255,255,255,.08);
  background:transparent;color:#64748b;
  font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;
}
.fb.on{background:linear-gradient(135deg,#6366f1,#8b5cf6);border-color:transparent;color:#fff;box-shadow:0 0 12px rgba(99,102,241,.3)}
.fb:hover:not(.on){border-color:rgba(255,255,255,.2);color:#94a3b8}
.cnt{margin-left:auto;font-size:11px;color:#334155;font-weight:500}

/* ERROR */
.err{margin:12px 16px;padding:12px 16px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:12px;color:#f87171;font-size:12px;display:none;justify-content:space-between;align-items:center}
.retry{background:rgba(239,68,68,.15);border:none;border-radius:6px;color:#f87171;padding:4px 12px;cursor:pointer;font-size:11px;font-weight:700}

/* LOADING */
.loading{text-align:center;padding:70px 20px;color:#334155}
.loading-icon{font-size:40px;margin-bottom:14px}
.loading-title{font-size:15px;font-weight:600;color:#475569}
.loading-sub{font-size:12px;margin-top:6px}

/* LIST */
.list{padding:12px 16px 40px;display:flex;flex-direction:column;gap:8px}

.card{
  border-radius:14px;border:1px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.03);cursor:pointer;
  transition:all .2s;position:relative;overflow:hidden;
}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.card.m5::before{background:linear-gradient(180deg,#f87171,#ef4444)}
.card.m4::before{background:linear-gradient(180deg,#fb923c,#f97316)}
.card.m3::before{background:linear-gradient(180deg,#fbbf24,#f59e0b)}
.card.m2::before{background:linear-gradient(180deg,#4ade80,#22c55e)}
.card.m1::before{background:linear-gradient(180deg,#c084fc,#a855f7)}
.card:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.12);transform:translateX(2px)}
.card.new-q{background:rgba(59,130,246,.06);border-color:rgba(59,130,246,.2)}
.card.upd-q{background:rgba(234,179,8,.04);border-color:rgba(234,179,8,.15)}

.ci{display:flex;align-items:center;gap:12px;padding:12px 14px 12px 16px}

.mag-ring{
  width:52px;height:52px;border-radius:50%;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;
}
.mag-ring::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(var(--ring-color) var(--ring-pct), rgba(255,255,255,.05) 0);
  padding:3px;-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;
}
.mag-num{font-size:14px;font-weight:900;line-height:1}
.mag-lbl{font-size:8px;font-weight:600;opacity:.6;margin-top:1px}

.cbody{flex:1;min-width:0}
.cplace{font-size:13px;font-weight:600;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ctime{font-size:11px;color:#475569;margin-top:3px;display:flex;gap:6px;align-items:center}
.time-ago{background:rgba(255,255,255,.05);padding:1px 6px;border-radius:4px;color:#64748b;font-size:10px}

.cdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

.tag{position:absolute;top:0;right:12px;font-size:9px;font-weight:700;color:#fff;padding:2px 8px;border-radius:0 0 8px 8px}
.tnew{background:rgba(59,130,246,.6);backdrop-filter:blur(4px)}
.tupd{background:rgba(234,179,8,.5);backdrop-filter:blur(4px)}

.cdetail{
  padding:10px 16px 13px;
  border-top:1px solid rgba(255,255,255,.06);
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  font-size:12px;color:#475569;
  background:rgba(0,0,0,.2);
}
.cdetail b{color:#94a3b8}

/* STATS PAGE */
.sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:14px 16px}
.sc{
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
  border-radius:14px;padding:16px 12px;text-align:center;
}
.sc-icon{font-size:24px;margin-bottom:6px}
.sc-val{font-size:24px;font-weight:900;background:linear-gradient(135deg,#f1f5f9,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sc-lbl{font-size:11px;color:#475569;margin-top:3px}
.cbox{margin:0 16px 20px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:16px}
.ctitle{font-size:13px;font-weight:700;color:#64748b;margin-bottom:14px}
.brow{margin-bottom:12px}
.bmeta{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;color:#64748b}
.btrack{background:rgba(255,255,255,.05);border-radius:6px;height:8px}
.bfill{border-radius:6px;height:8px;transition:width .7s cubic-bezier(.4,0,.2,1)}

.tc{display:none}.tc.on{display:block}
</style>
</head>
<body>

<header>
  <div class="hdr-top">
    <div class="hdr-logo">🌍</div>
    <div>
      <div class="hdr-title">Deprem Takip TR</div>
      <div class="hdr-sub" id="srcLbl">Kandilli Rasathanesi</div>
    </div>
    <div class="live-badge">
      <div class="pulse" id="dot"></div>
      <span id="ltxt">Yükleniyor</span>
    </div>
  </div>
  <div class="hdr-meta">
    <span id="lf">Bağlanılıyor…</span>
    <span class="cd-badge" id="cd">--</span>
    <button class="btn-refresh" id="rbtn" onclick="go()">↻ Yenile</button>
  </div>
</header>

<div class="stat-strip">
  <div class="ss-item"><div class="ss-val" id="st">—</div><div class="ss-lbl">Toplam</div></div>
  <div class="ss-item"><div class="ss-val" id="sd">—</div><div class="ss-lbl">Bugün</div></div>
  <div class="ss-item"><div class="ss-val orange" id="sm">—</div><div class="ss-lbl">En Büyük</div></div>
  <div class="ss-item"><div class="ss-val red" id="s4">—</div><div class="ss-lbl">M≥4</div></div>
</div>

<div class="tabs">
  <button class="tab on" onclick="stab(0,this)">🔴 Depremler</button>
  <button class="tab" onclick="stab(1,this)">📊 İstatistik</button>
</div>

<div id="eb" class="err"><span id="em"></span><button class="retry" onclick="go()">Tekrar dene</button></div>

<div id="t0" class="tc on">
  <div class="filter-bar">
    <button class="fb on" onclick="sm(0,this)">Tümü</button>
    <button class="fb" onclick="sm(1,this)">M≥1</button>
    <button class="fb" onclick="sm(2,this)">M≥2</button>
    <button class="fb" onclick="sm(3,this)">M≥3</button>
    <button class="fb" onclick="sm(4,this)">M≥4</button>
    <span class="cnt" id="cl"></span>
  </div>
  <div id="lb" class="loading">
    <div class="loading-icon">📡</div>
    <div class="loading-title">Veriler yükleniyor…</div>
    <div class="loading-sub">İlk açılışta ~30 saniye sürebilir</div>
  </div>
  <div class="list" id="ls" style="display:none"></div>
</div>

<div id="t1" class="tc">
  <div class="sgrid" id="sg"></div>
  <div class="cbox" id="cb"></div>
</div>

<script>
const B="https://deprem-backend-kvmk.onrender.com";
const RM=60000;
let Q=[],mm=0,ps={},ni=new Set(),ui=new Set(),oi=null,cd=RM/1e3,ti,ct;

const MC=m=>
  m>=5?{cls:"m5",tx:"#f87171",dot:"#ef4444",rc:"#ef4444",pct:Math.min(100,m/8*100)+"%"}:
  m>=4?{cls:"m4",tx:"#fb923c",dot:"#f97316",rc:"#f97316",pct:Math.min(100,m/8*100)+"%"}:
  m>=3?{cls:"m3",tx:"#fbbf24",dot:"#f59e0b",rc:"#f59e0b",pct:Math.min(100,m/8*100)+"%"}:
  m>=2?{cls:"m2",tx:"#4ade80",dot:"#22c55e",rc:"#22c55e",pct:Math.min(100,m/8*100)+"%"}:
       {cls:"m1",tx:"#c084fc",dot:"#a855f7",rc:"#a855f7",pct:Math.min(100,m/8*100)+"%"};

const fd=t=>new Date(t).toLocaleString("tr-TR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
const ag=t=>{const s=Math.floor((Date.now()-new Date(t))/1e3);return s<60?s+"sn":s<3600?Math.floor(s/60)+"dk":s<86400?Math.floor(s/3600)+"sa":Math.floor(s/86400)+"g"};

async function load(){
  sl(1);document.getElementById("rbtn").disabled=1;
  try{
    const r=await fetch(B+"/depremler");
    if(!r.ok)throw new Error("HTTP "+r.status);
    const j=await r.json();
    if(!j.quakes?.length)throw new Error("Veri boş");
    const nx={};ni=new Set();ui=new Set();
    for(const q of j.quakes){
      const fp=`${q.mag}|${q.depth}|${q.place}`;
      nx[q.id]=fp;
      const p=ps[q.id];
      if(p===undefined)ni.add(q.id);
      else if(p!==fp)ui.add(q.id);
    }
    ps=nx;Q=j.quakes;
    document.getElementById("srcLbl").textContent=j.source||"USGS";
    document.getElementById("lf").textContent="Son güncelleme: "+fd(new Date());
    cd=RM/1e3;
    he();rl();rs();us();
    setTimeout(()=>{ni=new Set();ui=new Set();rl();},10000);
    sl(0,1);
  }catch(e){se(e.message);sl(0,0);}
  finally{document.getElementById("rbtn").disabled=0;}
}

function sl(on,ok){
  const d=document.getElementById("dot"),t=document.getElementById("ltxt");
  if(on){d.className="pulse off";t.textContent="Güncelleniyor";}
  else if(ok){d.className="pulse";t.textContent="Canlı";}
  else{d.className="pulse off";t.textContent="Bağlantı hatası";}
}
function se(m){document.getElementById("em").textContent="⚠️ "+m;document.getElementById("eb").style.display="flex";}
function he(){document.getElementById("eb").style.display="none";}
function sm(v,b){mm=v;document.querySelectorAll(".fb").forEach(x=>x.classList.remove("on"));b.classList.add("on");rl();}

function us(){
  if(!Q.length)return;
  const td=new Date().toISOString().slice(0,10);
  document.getElementById("st").textContent=Q.length;
  document.getElementById("sd").textContent=Q.filter(q=>q.time.startsWith(td)).length;
  document.getElementById("sm").textContent="M"+Math.max(...Q.map(q=>q.mag)).toFixed(1);
  document.getElementById("s4").textContent=Q.filter(q=>q.mag>=4).length;
}

function rl(){
  const f=Q.filter(q=>q.mag>=mm);
  document.getElementById("cl").textContent=f.length+" kayıt";
  const lb=document.getElementById("lb"),ls=document.getElementById("ls");
  if(!Q.length){lb.style.display="block";ls.style.display="none";return;}
  lb.style.display="none";ls.style.display="flex";
  ls.innerHTML=f.map(q=>{
    const c=MC(q.mag),iN=ni.has(q.id),iU=ui.has(q.id),iO=oi===q.id;
    const ec=iN?"new-q":iU?"upd-q":"";
    return `<div class="card ${c.cls} ${ec}" onclick="tog('${q.id}')">
      ${iN?'<span class="tag tnew">YENİ</span>':""}
      ${iU?'<span class="tag tupd">GÜNCELLENDİ</span>':""}
      <div class="ci">
        <div class="mag-ring" style="--ring-color:${c.rc};--ring-pct:${c.pct}">
          <span class="mag-num" style="color:${c.tx}">M${q.mag.toFixed(1)}</span>
          <span class="mag-lbl" style="color:${c.tx}">${q.magType}</span>
        </div>
        <div class="cbody">
          <div class="cplace">${q.place}</div>
          <div class="ctime">${fd(q.time)}<span class="time-ago">${ag(q.time)} önce</span></div>
        </div>
        <div class="cdot" style="background:${c.dot}"></div>
      </div>
      ${iO?`<div class="cdetail">
        <span>🕳️ Derinlik <b>${q.depth} km</b></span>
        <span>📏 Tür <b>${q.magType}</b></span>
        <span>🌐 Enlem <b>${q.lat}</b></span>
        <span>🌐 Boylam <b>${q.lon}</b></span>
      </div>`:""}
    </div>`;
  }).join("");
}

function tog(id){oi=oi===id?null:id;rl();}

function rs(){
  if(!Q.length)return;
  const tot=Q.length,td=new Date().toISOString().slice(0,10);
  document.getElementById("sg").innerHTML=[
    {i:"📊",v:tot,l:"Toplam (500)"},
    {i:"📅",v:Q.filter(q=>q.time.startsWith(td)).length,l:"Bugün"},
    {i:"💥",v:"M"+Math.max(...Q.map(q=>q.mag)).toFixed(1),l:"En Büyük"},
    {i:"📈",v:"M"+(Q.reduce((s,q)=>s+q.mag,0)/tot).toFixed(1),l:"Ortalama"},
    {i:"🔵",v:Q.filter(q=>q.mag>=3).length,l:"M≥3"},
    {i:"⚠️",v:Q.filter(q=>q.mag>=4).length,l:"M≥4"},
  ].map(s=>`<div class="sc"><div class="sc-icon">${s.i}</div><div class="sc-val">${s.v}</div><div class="sc-lbl">${s.l}</div></div>`).join("");
  const bs=[
    {l:"M 5+",c:Q.filter(q=>q.mag>=5).length,col:"#ef4444"},
    {l:"M 4–5",c:Q.filter(q=>q.mag>=4&&q.mag<5).length,col:"#f97316"},
    {l:"M 3–4",c:Q.filter(q=>q.mag>=3&&q.mag<4).length,col:"#f0c040"},
    {l:"M 2–3",c:Q.filter(q=>q.mag>=2&&q.mag<3).length,col:"#3b82f6"},
    {l:"M 1–2",c:Q.filter(q=>q.mag>=1&&q.mag<2).length,col:"#22c55e"},
    {l:"M < 1",c:Q.filter(q=>q.mag<1).length,col:"#a855f7"},
  ];
  document.getElementById("cb").innerHTML=`<div class="ctitle">Büyüklük Dağılımı</div>`+
    bs.map(b=>{const p=Math.round(b.c/tot*100);return`<div class="brow"><div class="bmeta"><span>${b.l}</span><span>${b.c} (%${p})</span></div><div class="btrack"><div class="bfill" style="width:${p}%;background:${b.col}"></div></div></div>`;}).join("");
}

function stab(i,b){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));
  document.querySelectorAll(".tc").forEach(t=>t.classList.remove("on"));
  b.classList.add("on");
  document.getElementById("t"+i).classList.add("on");
}

function go(){
  cd=RM/1e3;clearInterval(ti);
  ti=setInterval(load,RM);load();
}

ct=setInterval(()=>{
  cd=Math.max(0,cd-1);
  document.getElementById("cd").textContent=cd+"sn";
},1000);

// Render uyanık tut
setInterval(()=>fetch(B+"/health").catch(()=>{}),14*60*1000);

load();ti=setInterval(load,RM);
</script>
</body>
</html>
