<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Deprem Takip TR</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#03050f;color:#f1f5f9;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(99,102,241,.15),transparent),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(239,68,68,.08),transparent);pointer-events:none;z-index:0}

/* HEADER */
header{position:sticky;top:0;z-index:200;background:rgba(3,5,15,.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.07);padding:0 16px}
.hdr-top{display:flex;align-items:center;gap:10px;padding:12px 0 5px}
.hdr-logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;box-shadow:0 0 20px rgba(99,102,241,.4)}
.hdr-title{font-size:16px;font-weight:800;letter-spacing:-.3px}
.hdr-meta{display:flex;align-items:center;gap:8px;padding:5px 0 11px;font-size:11px;color:#475569}
.cd-badge{background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.2);color:#818cf8;padding:2px 7px;border-radius:6px;font-size:10px}
.btn-refresh{margin-left:auto;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:8px;padding:5px 14px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-refresh:disabled{opacity:.4;cursor:not-allowed}

/* STAT STRIP */
.stat-strip{display:grid;grid-template-columns:repeat(4,1fr);background:rgba(255,255,255,.02);border-bottom:1px solid rgba(255,255,255,.07)}
.ss-item{padding:10px 6px;text-align:center;border-right:1px solid rgba(255,255,255,.05)}
.ss-item:last-child{border-right:none}
.ss-val{font-size:18px;font-weight:900;background:linear-gradient(135deg,#f1f5f9,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ss-val.orange{background:linear-gradient(135deg,#fb923c,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ss-val.red{background:linear-gradient(135deg,#f87171,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ss-lbl{font-size:10px;color:#475569;margin-top:1px;font-weight:500}

/* ANA SEKMELER (Kandilli / AFAD / Aktivite) */
.source-tabs{display:flex;background:rgba(255,255,255,.02);border-bottom:1px solid rgba(255,255,255,.07)}
.src-tab{flex:1;padding:12px 8px;border:none;background:transparent;color:#475569;font-size:13px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;text-align:center}
.src-tab.on{color:#f1f5f9;border-bottom-color:#6366f1;background:rgba(99,102,241,.06)}
.src-tab .src-badge{display:inline-flex;align-items:center;gap:5px}
.src-tab .src-dot{width:7px;height:7px;border-radius:50%;background:#334155}
.src-tab.on .src-dot{background:#22c55e;box-shadow:0 0 5px #22c55e}
.src-tab.loading .src-dot{background:#f97316}
.src-tab.error .src-dot{background:#ef4444}

/* ALT SEKMELER (Liste / Harita / İstatistik) */
.sub-tabs{display:flex;padding:0 16px;background:rgba(255,255,255,.02);border-bottom:1px solid rgba(255,255,255,.07)}
.sub-tab{padding:9px 12px;border:none;background:transparent;color:#475569;font-size:12px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.sub-tab.on{color:#f1f5f9;border-bottom-color:#6366f1}

/* FİLTRELER */
.filter-bar{display:flex;gap:6px;padding:10px 16px;background:rgba(255,255,255,.02);border-bottom:1px solid rgba(255,255,255,.06);flex-wrap:wrap;align-items:center}
.fb{padding:4px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.08);background:transparent;color:#64748b;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.fb.on{background:linear-gradient(135deg,#6366f1,#8b5cf6);border-color:transparent;color:#fff}
.fb:hover:not(.on){border-color:rgba(255,255,255,.2);color:#94a3b8}
.cnt{margin-left:auto;font-size:11px;color:#334155}
.region-filter{padding:8px 16px;background:rgba(255,255,255,.02);border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:8px}
.region-select{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#e2e8f0;padding:6px 10px;font-size:12px;outline:none;font-family:inherit}
.region-select option{background:#0d1117}

/* HATA */
.err{margin:10px 16px;padding:10px 14px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:12px;color:#f87171;font-size:12px;display:none;justify-content:space-between;align-items:center}
.retry{background:rgba(239,68,68,.15);border:none;border-radius:6px;color:#f87171;padding:3px 10px;cursor:pointer;font-size:11px;font-weight:700}

/* LOADING */
.loading{text-align:center;padding:60px 20px;color:#334155}
.loading-icon{font-size:38px;margin-bottom:12px}

/* KART LİSTESİ */
.list{padding:10px 16px 40px;display:flex;flex-direction:column;gap:7px}
.card{border-radius:13px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.card.m5::before{background:linear-gradient(180deg,#f87171,#ef4444)}
.card.m4::before{background:linear-gradient(180deg,#fb923c,#f97316)}
.card.m3::before{background:linear-gradient(180deg,#fde047,#eab308)}
.card.m2::before{background:linear-gradient(180deg,#d8b4fe,#a855f7)}
.card.m1::before{background:linear-gradient(180deg,#86efac,#22c55e)}
.card:hover{background:rgba(255,255,255,.05);transform:translateX(2px)}
.card.new-q{background:rgba(59,130,246,.06);border-color:rgba(59,130,246,.25)}
.card.upd-q{background:rgba(234,179,8,.04);border-color:rgba(234,179,8,.2)}
.ci{display:flex;align-items:center;gap:11px;padding:11px 13px 11px 15px}
.mag-ring{width:50px;height:50px;border-radius:50%;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.mag-ring::before{content:'';position:absolute;inset:0;border-radius:50%;background:conic-gradient(var(--rc) var(--rp), rgba(255,255,255,.05) 0);padding:3px;-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude}
.mag-num{font-size:13px;font-weight:900;line-height:1}
.mag-lbl{font-size:8px;font-weight:600;opacity:.6;margin-top:1px}
.cbody{flex:1;min-width:0}
.cplace{font-size:13px;font-weight:600;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ctime{font-size:11px;color:#475569;margin-top:3px;display:flex;gap:5px;align-items:center}
.time-ago{background:rgba(255,255,255,.05);padding:1px 5px;border-radius:4px;color:#64748b;font-size:10px}
.cdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tag{position:absolute;top:0;right:11px;font-size:9px;font-weight:700;color:#fff;padding:2px 7px;border-radius:0 0 7px 7px}
.tnew{background:rgba(59,130,246,.7)}.tupd{background:rgba(234,179,8,.6)}
.cdetail{padding:9px 15px 12px;border-top:1px solid rgba(255,255,255,.06);display:grid;grid-template-columns:1fr 1fr;gap:7px;font-size:12px;color:#475569;background:rgba(0,0,0,.25)}
.cdetail b{color:#94a3b8}

/* HARİTA */
.mapbox{height:400px;position:relative;z-index:1}
.map-legend{padding:8px 16px;display:flex;gap:10px;flex-wrap:wrap;background:rgba(255,255,255,.02);border-top:1px solid rgba(255,255,255,.06)}
.ml-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#64748b}
.ml-dot{width:9px;height:9px;border-radius:50%}

/* İSTATİSTİK */
.sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:14px 16px}
.sc{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:13px;padding:14px 12px;text-align:center}
.sc-icon{font-size:22px;margin-bottom:5px}
.sc-val{font-size:22px;font-weight:900;background:linear-gradient(135deg,#f1f5f9,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sc-lbl{font-size:11px;color:#475569;margin-top:2px}
.cbox{margin:0 16px 16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:13px;padding:14px}
.ctitle{font-size:13px;font-weight:700;color:#64748b;margin-bottom:12px}
.brow{margin-bottom:10px}
.bmeta{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;color:#64748b}
.btrack{background:rgba(255,255,255,.05);border-radius:5px;height:7px}
.bfill{border-radius:5px;height:7px;transition:width .7s}

/* AKTİVİTE */
.act-section{padding:14px 16px}
.act-title{font-size:13px;font-weight:700;color:#94a3b8;margin-bottom:12px}
.risk-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:20px;text-align:center;margin-bottom:12px}
.risk-mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.risk-mini{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:10px 8px;text-align:center}
.timeline-wrap{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:14px;overflow-x:auto}

.tc{display:none}.tc.on{display:block}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);backdrop-filter:blur(12px);border-radius:14px;padding:12px 20px;font-size:13px;font-weight:700;color:#f87171;z-index:1000;display:none;text-align:center;max-width:340px}
</style>
</head>
<body>

<header>
  <div class="hdr-top">
    <div class="hdr-logo">🌍</div>
    <div>
      <div class="hdr-title">Deprem Takip TR</div>
    </div>
    <div style="margin-left:auto;font-size:11px;color:#475569" id="lastFetch"></div>
  </div>
  <div class="hdr-meta">
    <span class="cd-badge" id="cd">--</span>
    <span id="lf" style="font-size:11px;color:#475569"></span>
    <button class="btn-refresh" id="rbtn" onclick="refreshAll()">↻ Yenile</button>
  </div>
</header>

<div class="stat-strip">
  <div class="ss-item"><div class="ss-val" id="st">—</div><div class="ss-lbl">Son 30 Gün</div></div>
  <div class="ss-item"><div class="ss-val" id="sd">—</div><div class="ss-lbl">Bugün</div></div>
  <div class="ss-item"><div class="ss-val orange" id="sm">—</div><div class="ss-lbl">En Büyük</div></div>
  <div class="ss-item"><div class="ss-val red" id="s4">—</div><div class="ss-lbl">M≥4</div></div>
</div>

<!-- ANA SEKMELER -->
<div class="source-tabs">
  <button class="src-tab on" id="stab0" onclick="srcTab(0)">
    <div class="src-badge"><div class="src-dot"></div>Kandilli</div>
  </button>
  <button class="src-tab" id="stab1" onclick="srcTab(1)">
    <div class="src-badge"><div class="src-dot"></div>AFAD</div>
  </button>
  <button class="src-tab" id="stab2" onclick="srcTab(2)">
    <div class="src-badge">⚡ Aktivite</div>
  </button>
</div>

<!-- KANDİLLİ -->
<div id="src0" class="tc on">
  <div class="sub-tabs">
    <button class="sub-tab on" onclick="subTab('k',0,this)">🔴 Liste</button>
    <button class="sub-tab" onclick="subTab('k',1,this)">🗺️ Harita</button>
    <button class="sub-tab" onclick="subTab('k',2,this)">📈 İstatistik</button>
  </div>
  <div id="kerr" class="err"><span id="kerrmsg"></span><button class="retry" onclick="loadKandilli()">Tekrar dene</button></div>
  <div id="ksub0" class="tc on">
    <div class="filter-bar">
      <button class="fb on" onclick="setMag('k',0,this)">Tümü</button>
      <button class="fb" onclick="setMag('k',1,this)">M≥1</button>
      <button class="fb" onclick="setMag('k',2,this)">M≥2</button>
      <button class="fb" onclick="setMag('k',3,this)">M≥3</button>
      <button class="fb" onclick="setMag('k',4,this)">M≥4</button>
      <span class="cnt" id="kcnt"></span>
    </div>
    <div class="region-filter">
      <span style="font-size:11px;color:#475569;white-space:nowrap">🗺️ Bölge:</span>
      <select class="region-select" id="kregion" onchange="renderList('k')">
        <option value="">Tümü Türkiye</option>
        <option value="marmara">Marmara</option>
        <option value="ege">Ege</option>
        <option value="akdeniz">Akdeniz</option>
        <option value="karadeniz">Karadeniz</option>
        <option value="ic">İç Anadolu</option>
        <option value="dogu">Doğu Anadolu</option>
        <option value="guneydogu">Güneydoğu Anadolu</option>
      </select>
    </div>
    <div id="klb" class="loading"><div class="loading-icon">📡</div><div>Kandilli yükleniyor…</div></div>
    <div class="list" id="klist" style="display:none"></div>
  </div>
  <div id="ksub1" class="tc">
    <div class="mapbox" id="kmap"></div>
    <div class="map-legend">
      <div class="ml-item"><div class="ml-dot" style="background:#ef4444"></div>M≥5</div>
      <div class="ml-item"><div class="ml-dot" style="background:#f97316"></div>M4–5</div>
      <div class="ml-item"><div class="ml-dot" style="background:#eab308"></div>M3–4</div>
      <div class="ml-item"><div class="ml-dot" style="background:#a855f7"></div>M2–3</div>
      <div class="ml-item"><div class="ml-dot" style="background:#22c55e"></div>M&lt;2</div>
    </div>
  </div>
  <div id="ksub2" class="tc">
    <div class="sgrid" id="kstats"></div>
    <div class="cbox" id="kchart"></div>
  </div>
</div>

<!-- AFAD -->
<div id="src1" class="tc">
  <div class="sub-tabs">
    <button class="sub-tab on" onclick="subTab('a',0,this)">🔴 Liste</button>
    <button class="sub-tab" onclick="subTab('a',1,this)">🗺️ Harita</button>
    <button class="sub-tab" onclick="subTab('a',2,this)">📈 İstatistik</button>
  </div>
  <div id="aerr" class="err"><span id="aerrmsg"></span><button class="retry" onclick="loadAfad()">Tekrar dene</button></div>
  <div id="asub0" class="tc on">
    <div class="filter-bar">
      <button class="fb on" onclick="setMag('a',0,this)">Tümü</button>
      <button class="fb" onclick="setMag('a',1,this)">M≥1</button>
      <button class="fb" onclick="setMag('a',2,this)">M≥2</button>
      <button class="fb" onclick="setMag('a',3,this)">M≥3</button>
      <button class="fb" onclick="setMag('a',4,this)">M≥4</button>
      <span class="cnt" id="acnt"></span>
    </div>
    <div class="region-filter">
      <span style="font-size:11px;color:#475569;white-space:nowrap">🗺️ Bölge:</span>
      <select class="region-select" id="aregion" onchange="renderList('a')">
        <option value="">Tümü Türkiye</option>
        <option value="marmara">Marmara</option>
        <option value="ege">Ege</option>
        <option value="akdeniz">Akdeniz</option>
        <option value="karadeniz">Karadeniz</option>
        <option value="ic">İç Anadolu</option>
        <option value="dogu">Doğu Anadolu</option>
        <option value="guneydogu">Güneydoğu Anadolu</option>
      </select>
    </div>
    <div id="alb" class="loading"><div class="loading-icon">📡</div><div>AFAD yükleniyor…</div></div>
    <div class="list" id="alist" style="display:none"></div>
  </div>
  <div id="asub1" class="tc">
    <div class="mapbox" id="amap"></div>
    <div class="map-legend">
      <div class="ml-item"><div class="ml-dot" style="background:#ef4444"></div>M≥5</div>
      <div class="ml-item"><div class="ml-dot" style="background:#f97316"></div>M4–5</div>
      <div class="ml-item"><div class="ml-dot" style="background:#eab308"></div>M3–4</div>
      <div class="ml-item"><div class="ml-dot" style="background:#a855f7"></div>M2–3</div>
      <div class="ml-item"><div class="ml-dot" style="background:#22c55e"></div>M&lt;2</div>
    </div>
  </div>
  <div id="asub2" class="tc">
    <div class="sgrid" id="astats"></div>
    <div class="cbox" id="achart"></div>
  </div>
</div>

<!-- AKTİVİTE -->
<div id="src2" class="tc">
  <div class="act-section">
    <div class="act-title">⚡ Anlık Aktivite Skoru (Kandilli + AFAD)</div>
    <div class="risk-card">
      <div id="riskLabel" style="font-size:28px;font-weight:900;margin-bottom:6px">—</div>
      <div id="riskDesc" style="font-size:12px;color:#64748b;margin-bottom:16px">Hesaplanıyor…</div>
      <div style="background:rgba(255,255,255,.05);border-radius:20px;height:12px;overflow:hidden;margin-bottom:8px">
        <div id="riskBar" style="height:100%;border-radius:20px;transition:width .8s ease;width:0%"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:#334155">
        <span>Düşük</span><span>Normal</span><span>Yüksek</span><span>Çok Yüksek</span>
      </div>
    </div>
    <div class="risk-mini-grid" id="riskMini"></div>
    <div class="act-title">🕐 Son 24 Saatin Aktivitesi</div>
    <div class="timeline-wrap">
      <div id="timeline" style="display:flex;align-items:flex-end;gap:3px;height:80px;min-width:500px"></div>
      <div id="tlabels" style="display:flex;justify-content:space-between;margin-top:5px;font-size:10px;color:#334155;min-width:500px"></div>
    </div>
    <div style="margin-top:8px;font-size:12px;color:#475569;text-align:center" id="tlinfo"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const B = "https://deprem-backend-kvmk.onrender.com";
const RM = 30000;

// Veri depoları
const D = { k: [], a: [] };
const PS = { k: {}, a: {} };
const NI = { k: new Set(), a: new Set() };
const UI = { k: new Set(), a: new Set() };
const OI = { k: null, a: null };
const MM = { k: 0, a: 0 };
const MAPS = { k: null, a: null };
const MARKERS = { k: [], a: [] };

let cd = RM/1000, cdTimer, timer;
let curSrc = 0;
const ALERT_MAG = 4.0;

const REGIONS = {
  marmara:   {minLat:40.0,maxLat:42.0,minLon:26.0,maxLon:31.5},
  ege:       {minLat:36.5,maxLat:40.0,minLon:26.0,maxLon:30.0},
  akdeniz:   {minLat:36.0,maxLat:38.5,minLon:28.5,maxLon:36.5},
  karadeniz: {minLat:40.5,maxLat:42.0,minLon:31.5,maxLon:40.0},
  ic:        {minLat:38.0,maxLat:40.5,minLon:30.0,maxLon:36.0},
  dogu:      {minLat:38.0,maxLat:40.5,minLon:36.0,maxLon:44.0},
  guneydogu: {minLat:36.5,maxLat:38.5,minLon:36.5,maxLon:44.0},
};

const MC = m =>
  m>=5?{cls:"m5",tx:"#f87171",dot:"#ef4444",rc:"#ef4444",rp:Math.min(99,m/8*100)+"%"}:
  m>=4?{cls:"m4",tx:"#fb923c",dot:"#f97316",rc:"#f97316",rp:Math.min(99,m/8*100)+"%"}:
  m>=3?{cls:"m3",tx:"#fde047",dot:"#eab308",rc:"#eab308",rp:Math.min(99,m/8*100)+"%"}:
  m>=2?{cls:"m2",tx:"#d8b4fe",dot:"#a855f7",rc:"#a855f7",rp:Math.min(99,m/8*100)+"%"}:
       {cls:"m1",tx:"#86efac",dot:"#22c55e",rc:"#22c55e",rp:Math.min(99,m/8*100)+"%"};

const fd = t => new Date(t).toLocaleString("tr-TR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
const ag = t => {
  const s=Math.floor((Date.now()-new Date(t))/1000);
  return s<60?s+"sn":s<3600?Math.floor(s/60)+"dk":s<86400?Math.floor(s/3600)+"sa":Math.floor(s/86400)+"g";
};

function inRegion(q, key) {
  if (!key) return true;
  const r = REGIONS[key];
  return q.lat>=r.minLat && q.lat<=r.maxLat && q.lon>=r.minLon && q.lon<=r.maxLon;
}

function beep(f=440,d=.3,v=.3){try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.value=v;o.start();g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.stop(c.currentTime+d);}catch(e){}}
function alertSound(){beep(880,.15,.4);setTimeout(()=>beep(660,.15,.4),180);setTimeout(()=>beep(440,.3,.4),360);}
function showToast(msg){const t=document.getElementById("toast");t.innerHTML=msg;t.style.display="block";setTimeout(()=>t.style.display="none",6000);}

// ── VERİ ÇEKME ──────────────────────────────────────────────────────────────
async function loadKandilli() {
  setTabState("k","loading");
  try {
    const r = await fetch(B+"/kandilli");
    if (!r.ok) throw new Error("HTTP "+r.status);
    const j = await r.json();
    processData("k", j.quakes||[]);
    setTabState("k","ok");
  } catch(e) {
    document.getElementById("kerrmsg").textContent = "⚠️ Kandilli: "+e.message;
    document.getElementById("kerr").style.display = "flex";
    setTabState("k","error");
  }
}

async function loadAfad() {
  setTabState("a","loading");
  try {
    const r = await fetch(B+"/afad");
    if (!r.ok) throw new Error("HTTP "+r.status);
    const j = await r.json();
    if (j.error) throw new Error(j.error);
    processData("a", j.quakes||[]);
    setTabState("a","ok");
  } catch(e) {
    document.getElementById("aerrmsg").textContent = "⚠️ AFAD: "+e.message;
    document.getElementById("aerr").style.display = "flex";
    setTabState("a","error");
  }
}

function processData(src, quakes) {
  const isFirst = Object.keys(PS[src]).length === 0;
  const nx = {};
  NI[src] = new Set(); UI[src] = new Set();
  let bigNew = null;
  for (const q of quakes) {
    const fp = `${q.mag}|${q.depth}|${q.place}`;
    nx[q.id] = fp;
    const p = PS[src][q.id];
    if (p === undefined) {
      NI[src].add(q.id);
      if (!isFirst && q.mag >= ALERT_MAG && (Date.now()-new Date(q.time)) < 5*60*1000) bigNew = q;
    } else if (p !== fp) UI[src].add(q.id);
  }
  PS[src] = nx;
  D[src] = quakes;

  renderList(src);
  renderStats(src);
  if (MAPS[src]) renderMapMarkers(src);
  if (bigNew) { alertSound(); showToast(`🚨 M${bigNew.mag.toFixed(1)} — ${bigNew.place}`); }
  setTimeout(() => { NI[src]=new Set(); UI[src]=new Set(); renderList(src); }, 10000);

  updateTopStats();
  renderActivity();
}

function setTabState(src, state) {
  const idx = src==="k"?0:1;
  const el = document.getElementById("stab"+idx);
  el.className = "src-tab" + (curSrc===idx?" on":"") + " "+state;
}

// ── RENDER LİSTE ─────────────────────────────────────────────────────────────
function renderList(src) {
  const id = src==="k"?"k":"a";
  const region = document.getElementById(id+"region").value;
  const f = D[src].filter(q => q.mag >= MM[src] && inRegion(q, region));
  document.getElementById(id+"cnt").textContent = f.length+" kayıt";
  const lb = document.getElementById(id+"lb");
  const ls = document.getElementById(id+"list");
  if (!D[src].length) { lb.style.display="block"; ls.style.display="none"; return; }
  lb.style.display="none"; ls.style.display="flex";
  const now = Date.now();
  ls.innerHTML = f.map(q => {
    const c = MC(q.mag);
    const isNew = NI[src].has(q.id) && (now-new Date(q.time)) < 5*3600*1000;
    const isUpd = UI[src].has(q.id);
    const isOpen = OI[src] === q.id;
    return `<div class="card ${c.cls} ${isNew?"new-q":isUpd?"upd-q":""}" onclick="toggleCard('${src}','${q.id}')">
      ${isNew?'<span class="tag tnew">YENİ</span>':""}
      ${isUpd?'<span class="tag tupd">GÜNCELLENDİ</span>':""}
      <div class="ci">
        <div class="mag-ring" style="--rc:${c.rc};--rp:${c.rp}">
          <span class="mag-num" style="color:${c.tx}">M${q.mag.toFixed(1)}</span>
          <span class="mag-lbl" style="color:${c.tx}">${q.magType}</span>
        </div>
        <div class="cbody">
          <div class="cplace">${q.place}</div>
          <div class="ctime">${fd(q.time)}<span class="time-ago">${ag(q.time)} önce</span></div>
        </div>
        <div class="cdot" style="background:${c.dot}"></div>
      </div>
      ${isOpen?`<div class="cdetail">
        <span>🕳️ Derinlik <b>${q.depth} km</b></span>
        <span>📏 Tür <b>${q.magType}</b></span>
        <span>🌐 Enlem <b>${q.lat}</b></span>
        <span>🌐 Boylam <b>${q.lon}</b></span>
      </div>`:""}
    </div>`;
  }).join("");
}

function toggleCard(src, id) { OI[src] = OI[src]===id?null:id; renderList(src); }
function setMag(src, v, btn) {
  MM[src] = v;
  const pfx = src==="k"?"k":"a";
  btn.closest(".filter-bar").querySelectorAll(".fb").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  renderList(src);
}

// ── HARİTA ───────────────────────────────────────────────────────────────────
function initMap(src) {
  const id = src==="k"?"kmap":"amap";
  if (MAPS[src]) return;
  MAPS[src] = L.map(id, {center:[39,35],zoom:6});
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OSM",maxZoom:18}).addTo(MAPS[src]);
  renderMapMarkers(src);
}
function renderMapMarkers(src) {
  if (!MAPS[src] || !D[src].length) return;
  MARKERS[src].forEach(m=>m.remove()); MARKERS[src]=[];
  D[src].forEach(q => {
    const c=MC(q.mag), r=Math.max(5,Math.min(22,q.mag*3.5));
    const icon=L.divIcon({className:"",html:`<div style="width:${r*2}px;height:${r*2}px;border-radius:50%;background:${c.dot};opacity:.85;border:2px solid rgba(255,255,255,.5);box-shadow:0 0 ${r}px ${c.dot}88"></div>`,iconSize:[r*2,r*2],iconAnchor:[r,r]});
    const mk=L.marker([q.lat,q.lon],{icon}).addTo(MAPS[src]);
    mk.bindPopup(`<b>M${q.mag.toFixed(1)}</b><br/>${q.place}<br/><small>${fd(q.time)}</small>`);
    MARKERS[src].push(mk);
  });
}

// ── İSTATİSTİK ───────────────────────────────────────────────────────────────
function renderStats(src) {
  const id = src==="k"?"k":"a";
  const Q = D[src];
  if (!Q.length) return;
  const tot=Q.length, td=new Date().toISOString().slice(0,10);
  document.getElementById(id+"stats").innerHTML=[
    {i:"📊",v:tot,l:"Son 30 Gün"},
    {i:"📅",v:Q.filter(q=>q.time.startsWith(td)).length,l:"Bugün"},
    {i:"💥",v:"M"+Math.max(...Q.map(q=>q.mag)).toFixed(1),l:"En Büyük"},
    {i:"📈",v:"M"+(Q.reduce((s,q)=>s+q.mag,0)/tot).toFixed(1),l:"Ortalama"},
    {i:"🔵",v:Q.filter(q=>q.mag>=3).length,l:"M≥3"},
    {i:"⚠️",v:Q.filter(q=>q.mag>=4).length,l:"M≥4"},
  ].map(s=>`<div class="sc"><div class="sc-icon">${s.i}</div><div class="sc-val">${s.v}</div><div class="sc-lbl">${s.l}</div></div>`).join("");
  const bs=[
    {l:"M 5+",c:Q.filter(q=>q.mag>=5).length,col:"#ef4444"},
    {l:"M 4–5",c:Q.filter(q=>q.mag>=4&&q.mag<5).length,col:"#f97316"},
    {l:"M 3–4",c:Q.filter(q=>q.mag>=3&&q.mag<4).length,col:"#eab308"},
    {l:"M 2–3",c:Q.filter(q=>q.mag>=2&&q.mag<3).length,col:"#a855f7"},
    {l:"M 1–2",c:Q.filter(q=>q.mag>=1&&q.mag<2).length,col:"#22c55e"},
    {l:"M < 1",c:Q.filter(q=>q.mag<1).length,col:"#64748b"},
  ];
  document.getElementById(id+"chart").innerHTML=`<div class="ctitle">Büyüklük Dağılımı</div>`+
    bs.map(b=>{const p=Math.round(b.c/tot*100);return`<div class="brow"><div class="bmeta"><span>${b.l}</span><span>${b.c} (%${p})</span></div><div class="btrack"><div class="bfill" style="width:${p}%;background:${b.col}"></div></div></div>`;}).join("");
}

// ── ÜST İSTATİSTİK ───────────────────────────────────────────────────────────
function updateTopStats() {
  const Q = [...D.k, ...D.a].reduce((acc, q) => {
    if (!acc.find(x=>x.id===q.id)) acc.push(q); return acc;
  }, []);
  if (!Q.length) return;
  const td = new Date().toISOString().slice(0,10);
  document.getElementById("st").textContent = Q.length;
  document.getElementById("sd").textContent = Q.filter(q=>q.time.startsWith(td)).length;
  document.getElementById("sm").textContent = "M"+Math.max(...Q.map(q=>q.mag)).toFixed(1);
  document.getElementById("s4").textContent = Q.filter(q=>q.mag>=4).length;
}

// ── AKTİVİTE ─────────────────────────────────────────────────────────────────
function renderActivity() {
  const Q = D.k.length ? D.k : D.a;
  if (!Q.length) return;
  const now = Date.now();
  const cutoff24 = now - 24*3600*1000;
  const last24 = Q.filter(q=>new Date(q.time)>=cutoff24);
  const last1h  = Q.filter(q=>(now-new Date(q.time))<3600*1000);
  const last6h  = Q.filter(q=>(now-new Date(q.time))<6*3600*1000);

  let score = 0;
  score += Math.min(40, last1h.length*4);
  score += Math.min(30, last1h.filter(q=>q.mag>=3).length*10);
  score += Math.min(20, last6h.filter(q=>q.mag>=4).length*10);
  score += last24.filter(q=>q.mag>=5).length>=1?10:0;
  score = Math.min(100, score);

  let txt, col, desc;
  if(score<20){txt="🟢 Düşük";col="linear-gradient(90deg,#22c55e,#16a34a)";desc="Deprem aktivitesi normalin altında.";}
  else if(score<45){txt="🟡 Normal";col="linear-gradient(90deg,#eab308,#ca8a04)";desc="Deprem aktivitesi normal seviyelerde.";}
  else if(score<70){txt="🟠 Yüksek";col="linear-gradient(90deg,#f97316,#ea580c)";desc="Son saatlerde belirgin deprem aktivitesi var.";}
  else{txt="🔴 Çok Yüksek";col="linear-gradient(90deg,#ef4444,#dc2626)";desc="Dikkat! Yoğun deprem aktivitesi.";}

  document.getElementById("riskLabel").textContent = txt;
  document.getElementById("riskDesc").textContent = desc;
  document.getElementById("riskBar").style.cssText = `height:100%;border-radius:20px;transition:width .8s ease;width:${score}%;background:${col}`;
  document.getElementById("riskMini").innerHTML=[
    {i:"⚡",v:last1h.length,l:"Son 1 Saat"},
    {i:"🕕",v:last6h.length,l:"Son 6 Saat"},
    {i:"📅",v:last24.length,l:"Son 24 Saat"},
  ].map(s=>`<div class="risk-mini"><div style="font-size:18px">${s.i}</div><div style="font-size:20px;font-weight:800;color:#f1f5f9">${s.v}</div><div style="font-size:10px;color:#475569">${s.l}</div></div>`).join("");

  const hours=Array(24).fill(0);
  last24.forEach(q=>{hours[new Date(q.time).getHours()]++;});
  const maxH=Math.max(...hours,1);
  const nowH=new Date().getHours();
  document.getElementById("timeline").innerHTML=hours.map((c,i)=>{
    const pct=Math.round(c/maxH*100);
    const col2=c===0?"rgba(255,255,255,.05)":c>=10?"#ef4444":c>=5?"#f97316":c>=2?"#eab308":"#22c55e";
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px" title="${i}:00 — ${c} deprem">
      <div style="font-size:9px;color:#475569;font-weight:700">${c||""}</div>
      <div style="width:100%;background:${col2};border-radius:3px 3px 0 0;height:${Math.max(2,pct*.7)}px;${i===nowH?"box-shadow:0 0 6px "+col2:""}"></div>
    </div>`;
  }).join("");
  document.getElementById("tlabels").innerHTML=hours.map((_,i)=>`<span style="${i===nowH?"color:#6366f1;font-weight:700":""}">${i.toString().padStart(2,"0")}</span>`).join("");
  const peak=hours.indexOf(Math.max(...hours));
  document.getElementById("tlinfo").textContent=`En yoğun: ${peak}:00 (${hours[peak]} deprem) · Şu an: ${last1h.length}/saat`;
}

// ── SEKME YÖNETİMİ ───────────────────────────────────────────────────────────
function srcTab(i) {
  curSrc = i;
  document.querySelectorAll(".src-tab").forEach((t,j)=>{
    t.classList.toggle("on", i===j);
  });
  document.querySelectorAll("#src0,#src1,#src2").forEach((t,j)=>t.classList.toggle("on",i===j));
  if (i===1 && !D.a.length) loadAfad();
}

function subTab(src, i, btn) {
  const pfx = src==="k"?"k":"a";
  btn.closest(".sub-tabs").querySelectorAll(".sub-tab").forEach(t=>t.classList.remove("on"));
  btn.classList.add("on");
  const subs = src==="k"?["ksub0","ksub1","ksub2"]:["asub0","asub1","asub2"];
  subs.forEach((id,j)=>document.getElementById(id).classList.toggle("on",i===j));
  if (i===1) setTimeout(()=>initMap(src),100);
}

// ── YENILE ───────────────────────────────────────────────────────────────────
function refreshAll() {
  cd = RM/1000;
  clearInterval(timer);
  timer = setInterval(tick, RM);
  tick();
}

function tick() {
  loadKandilli();
  if (D.a.length > 0 || curSrc===1) loadAfad();
  document.getElementById("lf").textContent = fd(new Date());
  cd = RM/1000;
}

cdTimer = setInterval(()=>{
  cd = Math.max(0, cd-1);
  document.getElementById("cd").textContent = cd+"sn";
},1000);

setInterval(()=>fetch(B+"/health").catch(()=>{}), 14*60*1000);

// Başlat
loadKandilli();
timer = setInterval(tick, RM);
</script>
